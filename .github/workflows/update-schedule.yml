name: Update PATCO Schedule

on:
  workflow_dispatch:

  schedule:
    # Every Sunday at 10:00 UTC
    - cron: "0 10 * * 0"

permissions:
  contents: write

env:
  GTFS_URL: https://rapid.nationalrtap.org/GTFSFileManagement/UserUploadFiles/13562/PATCO_GTFS.zip

jobs:
  update-schedule:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Download latest PATCO GTFS
        run: |
          curl \
            --location \
            --fail \
            --show-error \
            --silent \
            --output gtfs.zip \
            "$GTFS_URL"

      - name: Validate GTFS download
        run: |
          echo "Downloaded file:"
          ls -lh gtfs.zip

          echo
          echo "File type:"
          file gtfs.zip

          echo
          echo "ZIP integrity:"
          unzip -t gtfs.zip

      - name: Convert GTFS to schedule JSON
        run: |
          python3 tools/convert_gtfs_to_json.py

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet data/schedule.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit updated schedule
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          LAST_SYNC=$(date -u +"%Y-%m-%d %H:%M UTC")

          git add data/schedule.json

          git commit -m "Update PATCO schedule

          Last synced: ${LAST_SYNC}

          Automatically synchronized with the latest published PATCO GTFS feed."

          git push

      - name: No schedule changes
        if: steps.changes.outputs.changed == 'false'
        run: |
          echo "PATCO GTFS has not changed."
